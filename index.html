<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GridLock: Fuse & Clear</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <!-- Header -->
  <div class="header">
    <div class="logo">GridLock<span>Fuse & Clear</span></div>
  </div>

  <!-- Stats bar -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">Score</div>
      <div class="stat-value glow-blue">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">High Score</div>
      <div class="stat-value glow-gold">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Moves</div>
      <div class="stat-value glow-green">0</div>
    </div>
  </div>

  <!-- Level bar -->
  <div class="level-bar-wrap">
    <div class="level-label">LVL</div>
    <div class="level-bar">
      <div class="level-fill" style="width: 0%"></div>
    </div>
    <div class="level-num">1</div>
  </div>

  <!-- Grid -->
  <div class="grid-wrap">
    <div class="grid">
      <!-- Generated by script -->
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <!-- Generated by script -->
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
